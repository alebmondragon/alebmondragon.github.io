<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- The most important tag for mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mobile-Friendly Page</title>
    <style>
        /* Basic Reset and Typography */
        body {
            font-family: sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        /* Container that prevents content from hitting screen edges */
        .container {
            width: 90%;
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background: white;
        }

        /* Responsive images */
        img {
            max-width: 100%;
            height: auto;
        }

        header {
            background: #333;
            color: white;
            padding: 1rem;
            text-align: center;
        }

        /* Stacked layout for mobile, can be changed with Media Queries */
        section {
            padding: 20px 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Site</h1>
    </header>

    <div class="container">
        <section>
            <h2>Mobile-First Design</h2>
            <p>This layout uses a viewport tag and a container with <strong>90% width</strong> to ensure it looks good on phones, tablets, and desktops.</p>
        </section>

        <section>
            <h2>Responsive Elements</h2>
            <p>Try resizing your browser window! The text stays within the bounds, and the background adapts.</p>
        </section>
    </div>

</body>
</html>
